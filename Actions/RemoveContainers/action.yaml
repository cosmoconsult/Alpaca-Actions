name: Remove Containers
description: This action removes COSMO Alpaca containers
author: COSMO CONSULT
inputs:
  shell:
    description: Shell in which you want to run the action (powershell or pwsh)
    required: false
    default: powershell
  token:
    description: The GitHub token running the action
    required: false
    default: ${{ github.token }}
  projectFilter:
    description: Optional filter for project name
    required: false
    default: "*"
  buildModeFilter:
    description: Optional filter for build mode
    required: false
    default: "*"
runs:
  using: composite
  steps:
    - id: RemoveContainers
      name: Remove COSMO Alpaca Containers
      shell: ${{ inputs.shell }}
      env:
        _token: ${{ inputs.token }}
        _projectFilter: ${{ inputs.projectFilter }}
        _buildModeFilter: ${{ inputs.buildModeFilter }}
      run: |
        ${{ github.action_path }}/RemoveContainers.ps1 -Token $env:_token -ProjectFilter $env:_projectFilter -BuildModeFilter $env:_buildModeFilter
branding:
  icon: terminal
  color: blue
